name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-frontend:
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run typecheck

  deploy:
    needs: [test-frontend]
    runs-on: self-hosted
    steps:
      - name: Deploy
        shell: powershell
        run: |
          $bash = "C:\Program Files\Git\bin\bash.exe"
          if (!(Test-Path $bash)) { $bash = (Get-Command bash -ErrorAction SilentlyContinue).Source }
          if (!$bash) { throw "bash não encontrado" }
          & $bash "E:/claudecode/claudecode/deploy.sh"
